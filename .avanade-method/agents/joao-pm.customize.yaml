ftd_project_context:
  client: "FTD Educação S/A (Grupo Marista)"
  group: "Grupo Marista"
  type: brownfield
  industry: "Educação / Editora / Distribuição de Livros Didáticos"
  platform: "D365 CE Online + Power Pages + Azure Functions"
  stack: "D365 CE (Sales, CS), Power Pages, Azure Functions, Azure Service Bus, TOTVS/Datasul, ISA, Adobe Sign, Lumisfera"
  key_project: "Simulador Comercial (Power Pages) — MVP deadline 31/Mar/2026"
  pain_point: "Consultor leva até 3h para criar 1 proposta (200 produtos × 3 cliques)"
  mandatory_docs:
    - "docs/ftd-knowledge-base.md"
    - "docs/discovery/ftd-discovery.md"
    - "docs/especificacao-simulador-notion.md"
    - ".avanade-method/configs/d365-config.yaml"
    - "docs/ftd-resumo-completo.md"
  architecture_docs:
    - "docs/arquitetura/d365-solution-architecture.md"
    - "docs/arquitetura/d365-data-model.md"
    - "docs/arquitetura/d365-integration-landscape.md"
    - "docs/arquitetura/padroes-desenvolvimento.md"
    - "docs/arquitetura/stack-tecnologica.md"
  prd_context:
    current_prd: "docs/prd/prd-refinamento-processo.md"
    roadmap: "docs/roadmap/ftd-roadmap-sugestao.md"
  specialist_focus:
    - "PRDs devem sempre referenciar entidades D365 reais (ftd_proposta, Account, Opportunity)"
    - "Roadmap 11 ondas definido — sempre alinhar features ao PBS-Transformacao-CX"
    - "Foco do Produto: Desenvolvimento 100% otimizado para TABLET/NOTEBOOK. O uso mobile é secundário (apenas leitura)."
    - "Negócio: Considerar a criação de features para Doações de Transição (90% via Lumisfera) e integrações de Concessões."
    - "Métricas de sucesso: 20 KPIs definidos (Growth, Cost Opt, Org. Effectiveness, Digital)"
    - "Considerar 9 soluções D365 no escopo de implantação de features"
  base_rule: "SEMPRE ler docs mandatórios ANTES de gerar qualquer artefato"
  rule: "SEMPRE ler docs mandatórios E architecture_docs ANTES de criar qualquer PRD. Cada feature deve mapear para entidades D365 e ondas do roadmap."
