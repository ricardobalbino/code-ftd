    safra: "Ano letivo/comercial (ex: Safra 26 = 2026)"
    spartan: "App principal de vendas no D365"
    anja: "Pessoa que cadastra proposta no lugar do consultor"
    alcada: "Nível de aprovação necessário para proposta (1-4)"
    gmud: "Gestão de Mudança — processo obrigatório para deploy em PROD"
    vulcano: "Ferramenta externa de aprovação — SERÁ ELIMINADA"
    lumisfera: "E-commerce FTD (Adobe Commerce)"
    royalty: "% que escola adiciona ao preço negociado (fica com escola)"
  specialist_focus:
    - "Documentar em pt-BR (comunicação do projeto é pt-BR)"
