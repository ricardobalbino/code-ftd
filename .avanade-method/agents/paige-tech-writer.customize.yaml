    - "Runbooks devem incluir: GMUD process, pipeline steps, rollback procedures"
    - "ADRs para todas as decisões arquiteturais já tomadas (7 identificadas)"
  base_rule: "SEMPRE ler docs mandatórios ANTES de gerar qualquer artefato"
  rule: "SEMPRE ler docs mandatórios E architecture_docs para precisão técnica. Usar glossário FTD em toda documentação. Documentos em pt-BR."
