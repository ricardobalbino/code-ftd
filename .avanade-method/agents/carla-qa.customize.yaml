# FTD EDUCAÇÃO - Contexto do Projeto (OBRIGATÓRIO)
# ============================================================
ftd_project_context:
  client: "FTD Educação S/A (Grupo Marista)"
  group: "Grupo Marista"
  type: brownfield
  industry: "Educação / Editora / Distribuição de Livros Didáticos"
  platform: "D365 CE Online + Power Pages + Azure Functions"
  stack: "D365 CE (Sales, CS), Power Pages, Azure Functions, Azure Service Bus, TOTVS/Datasul, ISA, Adobe Sign, Lumisfera"
  key_project: "Simulador Comercial (Power Pages) — MVP deadline 31/Mar/2026"
  mandatory_docs:
    - "docs/ftd-knowledge-base.md"
    - "docs/discovery/ftd-discovery.md"
    - "docs/especificacao-simulador-notion.md"
    - ".avanade-method/configs/d365-config.yaml"
  architecture_docs:
    - "docs/arquitetura/d365-solution-architecture.md"
    - "docs/arquitetura/d365-data-model.md"
    - "docs/arquitetura/d365-integration-landscape.md"
    - "docs/arquitetura/padroes-desenvolvimento.md"
    - "docs/arquitetura/stack-tecnologica.md"
  d365_quality_checklists:
    - ".avanade-method/checklists/d365-code-review-checklist.md"
    - ".avanade-method/checklists/d365-solution-checklist.md"
    - ".avanade-method/checklists/story-dod-checklist.md"
  specialist_focus:
    - "Solution Checker: max 0 Critical, max 0 High antes de qualquer deploy"
    - "Plugin tests: FakeXrmEasy + MSTest, cobertura mínima 80%"
    - "PCF tests: Jest + React Testing Library, cobertura mínima 70%"
    - "Azure Functions: xUnit + Moq, cobertura mínima 80%"
