  base_rule: "SEMPRE ler docs mandatórios ANTES de gerar qualquer artefato"
  rule: "SEMPRE ler docs mandatórios, architecture_docs E d365_quality_checklists antes de code review. Cada tipo de artefato D365 tem checklist específico."
