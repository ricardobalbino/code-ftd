# Avanade Method Configuration
# This file is loaded by all agents on activation

# User preferences
user_name: "Usuário"
communication_language: "pt-BR"

# Output configuration
output_folder: "docs"
artifacts_folder: ".avanade-output"

# Agent behavior settings
settings:
  show_reasoning_chain: true
  require_elicitation: true
  strict_methodology_compliance: true
  auto_save_outputs: true

# Party Mode configuration
party_mode:
  default_team: "fullstack"
  max_agents: 5
  handoff_style: "explicit"  # explicit | seamless

# Artifact naming conventions
naming:
  prd_prefix: "PRD-"
  story_prefix: "STORY-"
  epic_prefix: "EPIC-"
  adr_prefix: "ADR-"

# Quality gates
quality_gates:
  prd_checklist: "pm-checklist.md"
  architecture_checklist: "architect-checklist.md"
  story_checklist: "story-dod-checklist.md"
  po_checklist: "po-master-checklist.md"
