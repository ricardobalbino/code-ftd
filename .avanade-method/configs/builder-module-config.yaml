## 📋 O que é este Artefato?

Este artifact configura o módulo Builder, incluindo versão, agentes disponíveis, artifacts referenciados e configurações gerais.

---

## 🎯 Quando Usar

Use este artifact para:
- ✅ Configurar Builder Module em novo ambiente
- ✅ Listar builders disponíveis
- ✅ Referenciar artifacts do módulo
- ✅ Documentar versão e dependências

---

## 📖 Estrutura YAML

```yaml
# AVANADE BUILDER MODULE - Configuration
# Version: 2.0
# Platform: Avanade Method via MCP

---

## Module Metadata
module:
  id: "avanade-builder-module"
  name: "Avanade Builder Module"
  version: "2.0"
  type: "optional"
  status: "active"
  created: "2026-02-12"
  updated: "2026-02-12"
  
  description: |
    Módulo opcional do Avanade Method para criação e customização
    de componentes metodológicos (agentes, workflows, tasks).
    
  features:
    - "Auto-geração de agentes Avanade Method"
    - "Criação de workflows especializados"
    - "Geração de tasks/checklists reutilizáveis"
    - "Exportação para Plataforma Cockpit (JSON)"
    - "Sistema de delegação supervisor → standard agents"

---

## Builders Available

builders:
  - builder_id: "AVANADE_BUILDER_AGENT_SUPERVISOR"
    name: "Agent Builder"
    type: "Supervisor"
    role: "Criar e gerenciar agentes completos"
    chatmode_file: ".github/agents/avanade-agent-builder.agent.md"
    instruction_artifact: "AVANADE_BUILDER_AGENT_SUPERVISOR_INSTRUCTION_MD"
    prompt_artifact: "AVANADE_BUILDER_AGENT_PROMPT_MD"
    status: "active"
    
    capabilities:
      - "Criar estrutura de agente (.customize.yaml + .agent.md)"
      - "Configurar sistema de herança"
      - "Delegar workflows para Workflow Builder"
      - "Delegar tasks para Task Builder"
      - "Validar conformidade metodológica"
      - "Exportar agente para Cockpit (JSON)"
    
    delegation:
      can_delegate: true
      delegates_to:
        - "Workflow Builder"
        - "Task Builder"
  
  - builder_id: "AVANADE_BUILDER_WORKFLOW_STANDARD"
    name: "Workflow Builder"
    type: "Standard"
    role: "Criar workflows metodológicos"
    chatmode_file: ".github/agents/avanade-workflow-builder.agent.md"
    instruction_artifact: "AVANADE_BUILDER_WORKFLOW_INSTRUCTION_MD"
    prompt_artifact: "AVANADE_BUILDER_WORKFLOW_PROMPT_MD"
    status: "active"
    
    capabilities:
      - "Criar workflows estruturados (.workflow.md)"
      - "Gerar diagramas Mermaid"
      - "Aplicar padrões metodológicos"
      - "Integrar com manifesto de workflows"
    
    delegation:
      can_delegate: false
  
  - builder_id: "AVANADE_BUILDER_TASK_STANDARD"
    name: "Task Builder"
    type: "Standard"
    role: "Criar tasks e checklists"
    chatmode_file: ".github/agents/avanade-task-builder.agent.md"
    instruction_artifact: "AVANADE_BUILDER_TASK_INSTRUCTION_MD"
    prompt_artifact: "AVANADE_BUILDER_TASK_PROMPT_MD"
    status: "active"
    
    capabilities:
      - "Criar tasks/checklists (.task.md)"
      - "Definir critérios de validação"
      - "Aplicar scoring models"
      - "Categorizar tasks por tipo"
    
    delegation:
      can_delegate: false

