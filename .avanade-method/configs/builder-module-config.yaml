## Dependencies

dependencies:
  core_artifacts:
    - artifact: "AVANADE_BASE_MASTER_AGENT_MD"
      required: true
      description: "Template base de herança para agentes"
      
    - artifact: "AVANADE_BASE_CONFIG_YAML"
      required: true
      description: "Configuração base de herança"
      
    - artifact: "AVANADE_WORKFLOW_MANIFEST"
      required: false
      description: "Manifesto de workflows existentes"
      
    - artifact: "AVANADE_MERMAID_LIBRARY_MD"
      required: false
      description: "Biblioteca de diagramas Mermaid"
      
    - artifact: "AVANADE_DOC_STANDARDS_MD"
      required: true
      description: "Padrões de documentação"
  
  vscode:
    required: true
    version: ">= 1.80"
    extensions:
      - "GitHub.copilot"
      - "GitHub.copilot-chat"
  
  mcp:
    required: true
    server: "avanade-metho"
    tools:
      - "mcp_avanade-metho_get_artifact"
      - "mcp_avanade-metho_create_artifact"
      - "mcp_avanade-metho_update_artifact"
      - "mcp_avanade-metho_search_artifacts"

---

## Installation

installation:
  folder_structure:
    root: "[WORKSPACE_ROOT]"
    
    folders:
      - path: ".github/agents/"
        description: "Chatmode files dos builders"
        files:
          - "avanade-agent-builder.agent.md"
          - "avanade-workflow-builder.agent.md"
          - "avanade-task-builder.agent.md"
      
      - path: ".avanade-method/_builders/"
        description: "Módulo builder (opcional)"
        files:
          - "README.md"
          - "config.yaml"
        subfolders:
          - "templates/"
          - "agents/"
          - "examples/"
          - "validation/"
      
      - path: ".avanade-method/agents/"
        description: "Agentes customizados gerados"
        pattern: "{nome}.customize.yaml"
      
      - path: ".avanade-method/workflows/"
        description: "Workflows gerados"
        pattern: "{nome}.workflow.md"
      
      - path: ".avanade-method/tasks/"
        description: "Tasks geradas"
        pattern: "{nome}.task.md"

---

## Usage

usage:
  activation:
    agent_builder:
      chatmode: "@avanade-agent-builder"
      menu_trigger: "Digite número da ação desejada"
      
    workflow_builder:
      chatmode: "@avanade-workflow-builder"
      menu_trigger: "Digite número da ação desejada"
      
    task_builder:
      chatmode: "@avanade-task-builder"
      menu_trigger: "Digite número da ação desejada"
  
  workflows:
    create_new_agent:
      builder: "Agent Builder (Supervisor)"
      steps:
        - "Discovery Protocol (6 perguntas)"
        - "Criar estrutura core"
        - "Configurar herança"
        - "Delegar workflows (opcional)"
        - "Delegar tasks (opcional)"
        - "Validar conformidade"
        - "Gerar documentação"
    
    export_to_cockpit:
      builder: "Agent Builder (Supervisor)"
      command: "export-to-cockpit"
      output: "agent-{nome}/cockpit-export.json"

