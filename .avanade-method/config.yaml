# Avanade Method - Unified Configuration
# Este arquivo é carregado automaticamente por TODOS os agentes na ativação
# Ref: avanade-master.md step 2 → "{project-root}/.avanade-method/config.yaml"
# Merge de base-config.yaml + core-config.yaml + referências FTD
# Última atualização: 2026-03-25

# ============================================================
# USER & PROJECT
# ============================================================
version: 4.30.0
user_name: "Usuário"
communication_language: "pt-BR"
output_folder: "docs"
artifacts_folder: ".avanade-output"
slashPrefix: Avanade

# ============================================================
# PROJECT CONTEXT - FTD Educação
# ============================================================
project:
  client: "FTD Educação (Grupo Marista)"
  type: brownfield
  platform: dynamics-365-ce-online
  stack: "D365 CE (Sales, CS), Power Pages, Azure Functions, TOTVS/Datasul, ISA, Adobe Sign"

# ============================================================
# MANDATORY READING - Loaded by ALL agents
# ============================================================
devLoadAlwaysFiles:
  # Core Knowledge Base
  - docs/ftd-knowledge-base.md
  - docs/discovery/ftd-discovery.md
  # Especificações de Produto
  - docs/especificacao-simulador-notion.md
  - docs/especificacao-aprovacao-notion.md
  # Config D365 e Padrões
  - .avanade-method/configs/d365-config.yaml
  - .github/instructions/avanade-bca-guidelines.instructions.md
  # Arquitetura
  - docs/arquitetura/d365-solution-architecture.md
  - docs/arquitetura/d365-data-model.md
  - docs/arquitetura/d365-integration-landscape.md
  - docs/arquitetura/padroes-desenvolvimento.md
  - docs/arquitetura/stack-tecnologica.md
  - docs/arquitetura/microsoft-reference-architecture.md
  # Referências de Segurança e Ferramentas
  - docs/analise-riscos-mwhesse-dataverse-mcp.md

# ============================================================
# DISCOVERY & ARCHITECTURE LOCATIONS
# ============================================================
discovery:
  discoveryFile: docs/discovery.md
  discoverySharded: true
  discoveryShardedLocation: docs/discovery
architecture:
  architectureFile: docs/arquitetura.md
  architectureSharded: true
  architectureShardedLocation: docs/arquitetura

# ============================================================
# DEV SETTINGS
# ============================================================
devDebugLog: .ai/debug-log.md
devStoryLocation: docs/stories

# ============================================================
# AGENT BEHAVIOR
# ============================================================
settings:
  show_reasoning_chain: true
  require_elicitation: true
  strict_methodology_compliance: true
  auto_save_outputs: true

party_mode:
  default_team: "fullstack"
  max_agents: 5
  handoff_style: "explicit"

naming:
  prd_prefix: "PRD-"
  story_prefix: "STORY-"
  epic_prefix: "EPIC-"
  adr_prefix: "ADR-"
