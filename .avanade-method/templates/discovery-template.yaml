---

## 📋 Objetivo

Template padronizado para documentação de Discovery. Captura insights de pesquisa, análise de stakeholders, contexto de negócio e requisitos iniciais para projetos e features.

---

## 📝 Discovery Document Template

```yaml
# Discovery Document

## Metadata
discovery_id: "DISC-[PROJECT]-[VERSION]"
project: "[Nome do Projeto/Feature]"
version: "1.0"
status: "[Draft | In Progress | Completed | Approved]"
created_by: "[Analyst Name]"
created_at: "[YYYY-MM-DD]"
updated_at: "[YYYY-MM-DD]"
stakeholders:
  - name: "[Stakeholder 1]"
    role: "[Role]"
    interviewed: false
  - name: "[Stakeholder 2]"
    role: "[Role]"
    interviewed: false

---

## 1. Executive Summary

### 1.1 Purpose
purpose: |
  [Resumo executivo do propósito deste discovery em 2-3 parágrafos.
   O que estamos tentando descobrir/validar?]

### 1.2 Background
background: |
  [Contexto que levou a este discovery.
   Problema ou oportunidade identificada.]

### 1.3 Key Findings Summary
key_findings:
  - finding: "[Finding principal 1]"
    impact: "[Alto/Médio/Baixo]"
  - finding: "[Finding principal 2]"
    impact: "[Alto/Médio/Baixo]"
  - finding: "[Finding principal 3]"
    impact: "[Alto/Médio/Baixo]"

---

## 2. Research Scope

### 2.1 Objectives
objectives:
  primary:
    - "[Objetivo principal 1]"
    - "[Objetivo principal 2]"
  secondary:
    - "[Objetivo secundário 1]"
    
### 2.2 Scope Definition
scope:
  in_scope:
    - "[Área/tópico incluído]"
    - "[Área/tópico incluído]"
  out_of_scope:
    - "[Área/tópico excluído]"
    - "[Área/tópico excluído]"
  assumptions:
    - "[Assumption 1]"
    - "[Assumption 2]"

### 2.3 Research Questions
research_questions:
  - question: "[Pergunta de pesquisa 1]"
    priority: "[Alta/Média/Baixa]"
    answered: false
    answer: ""
  - question: "[Pergunta de pesquisa 2]"
    priority: "[Alta/Média/Baixa]"
    answered: false
    answer: ""

---

## 3. Stakeholder Analysis

### 3.1 Stakeholder Map
stakeholder_map:
  decision_makers:
    - name: "[Nome]"
      role: "[Cargo]"
      influence: "[Alto/Médio/Baixo]"
      interest: "[Alto/Médio/Baixo]"
      concerns: "[Principais preocupações]"
      
  key_influencers:
    - name: "[Nome]"
      role: "[Cargo]"
      influence: "[Alto/Médio/Baixo]"
      interest: "[Alto/Médio/Baixo]"
      
  end_users:
    - persona: "[Tipo de usuário]"
      count: "[Estimativa de quantidade]"
      needs: "[Principais necessidades]"
      pain_points: "[Pontos de dor]"

### 3.2 Interview Insights
interviews:
  - interviewee: "[Nome]"
    role: "[Cargo]"
    date: "[YYYY-MM-DD]"
    key_insights:
      - "[Insight 1]"
      - "[Insight 2]"
    quotes:
      - "[Citação relevante]"

---

## 4. Current State Analysis

### 4.1 As-Is Process
current_process:
  description: |
    [Descrição do processo atual]
  
  pain_points:
    - "[Pain point 1]"
    - "[Pain point 2]"
    
  workarounds:
    - "[Workaround usado atualmente]"
    
  metrics:
    - metric: "[Métrica atual]"
      value: "[Valor]"
      source: "[Fonte do dado]"

### 4.2 Existing Solutions
existing_solutions:
  - name: "[Solução existente]"
    type: "[Interno/Externo/Competidor]"
    pros:
      - "[Vantagem 1]"
    cons:
      - "[Desvantagem 1]"
    lessons: "[O que podemos aprender]"

### 4.3 Technical Landscape
technical_context:
  current_systems:
    - name: "[Sistema]"
      purpose: "[Para que é usado]"
      integration_needed: "[Sim/Não]"
      
  constraints:
    - "[Restrição técnica]"
    
  opportunities:
    - "[Oportunidade técnica]"

---

## 5. Business Context

### 5.1 Business Drivers
business_drivers:
  - driver: "[Driver de negócio]"
    urgency: "[Alta/Média/Baixa]"
    impact: "[Descrição do impacto]"

### 5.2 Success Criteria
success_criteria:
  - criterion: "[Critério de sucesso]"
    measurement: "[Como medir]"
    target: "[Meta]"
    timeframe: "[Prazo]"

### 5.3 Constraints & Risks
constraints:
  budget: "[Budget disponível ou limitação]"
  timeline: "[Prazo ou deadline]"
  resources: "[Limitações de recursos]"
  
risks:
  - risk: "[Risco identificado]"
    probability: "[Alta/Média/Baixa]"
    impact: "[Alto/Médio/Baixo]"
    mitigation: "[Estratégia de mitigação]"

---

## 6. User Research

### 6.1 User Personas
personas:
  - name: "[Nome da Persona]"
    type: "[Primary/Secondary]"
    demographics: |
      [Idade, cargo, experiência técnica, etc.]
    goals:
      - "[Goal 1]"
      - "[Goal 2]"
    frustrations:
      - "[Frustração 1]"
      - "[Frustração 2]"
    quote: "[Citação representativa]"

### 6.2 User Journey
user_journey:
  scenario: "[Cenário principal]"
  stages:
    - stage: "[Nome do estágio]"
      user_actions: "[O que usuário faz]"
      touchpoints: "[Pontos de contato]"
      emotions: "[Como se sente]"
      pain_points: "[Pontos de dor]"
      opportunities: "[Oportunidades de melhoria]"

### 6.3 Jobs To Be Done
jobs_to_be_done:
  - job: "When [situação], I want to [motivação], so I can [resultado]"
    priority: "[Alta/Média/Baixa]"
    current_solution: "[Como resolve hoje]"
    satisfaction: "[1-5]"

---

## 7. Competitive Analysis

### 7.1 Competitive Landscape
competitors:
  - name: "[Competidor]"
    type: "[Direto/Indireto]"
    strengths:
      - "[Força 1]"
    weaknesses:
      - "[Fraqueza 1]"
    differentiators: "[O que os diferencia]"
    market_position: "[Posição no mercado]"

### 7.2 Feature Comparison
feature_comparison:
  | Feature | Us | Competitor A | Competitor B |
  |---------|-----|--------------|--------------|
  | [Feature 1] | [Status] | [Status] | [Status] |

---

## 8. Requirements Elicitation

### 8.1 Functional Requirements
functional_requirements:
  must_have:
    - id: "FR-001"
      description: "[Requisito funcional]"
      rationale: "[Por que é necessário]"
      source: "[Stakeholder/Research]"
      
  should_have:
    - id: "FR-002"
      description: "[Requisito funcional]"
      
  could_have:
    - id: "FR-003"
      description: "[Requisito funcional]"

### 8.2 Non-Functional Requirements
non_functional_requirements:
  performance:
    - "[Requisito de performance]"
  security:
    - "[Requisito de segurança]"
  usability:
    - "[Requisito de usabilidade]"
  scalability:
    - "[Requisito de escalabilidade]"

### 8.3 Integration Requirements
integration_requirements:
  - system: "[Sistema a integrar]"
    type: "[API/File/Event/etc]"
    direction: "[Inbound/Outbound/Bidirectional]"
    data: "[Dados trocados]"
    frequency: "[Tempo real/Batch/On-demand]"

---

## 9. Recommendations

### 9.1 Strategic Recommendations
recommendations:
  - recommendation: "[Recomendação]"
    priority: "[Alta/Média/Baixa]"
    effort: "[Alto/Médio/Baixo]"
    impact: "[Alto/Médio/Baixo]"
    rationale: "[Justificativa]"

### 9.2 Proposed Solution Direction
solution_direction: |
  [Direção proposta para a solução baseada nos findings.
   Não é detalhamento técnico, mas orientação estratégica.]

### 9.3 Next Steps
next_steps:
  - action: "[Próximo passo]"
    owner: "[Responsável]"
    deadline: "[Prazo]"
    dependencies: "[Dependências]"

---

## 10. Appendices

### 10.1 Research Artifacts
artifacts:
  - name: "[Nome do artefato]"
    type: "[Interview transcript/Survey results/etc]"
    location: "[Link ou referência]"

### 10.2 Glossary
glossary:
  - term: "[Termo]"
    definition: "[Definição]"

### 10.3 References
references:
  - "[Referência 1]"
  - "[Referência 2]"
```

---

## 📊 Discovery Process Flow

```mermaid
graph LR
    A[Kick-off] --> B[Research Planning]
    B --> C[Stakeholder Interviews]
    B --> D[User Research]
    B --> E[Technical Assessment]
    C --> F[Analysis]
    D --> F
    E --> F
    F --> G[Synthesis]
    G --> H[Recommendations]
    H --> I[Discovery Report]
```

