## ?? Exemplo de PRD Preenchido (Resumido)

```yaml
metadata:
  document_id: "PRD-2025-02-001"
  title: "Automated Data Export System"
  version: "1.0"
  status: "In Review"
  owner:
    name: "Joăo Silva"
    email: "joao.silva@example.com"

executive_summary:
  problem_statement: |
    Usuários enterprise gastam 2h/dia exportando dados manualmente,
    resultando em 40% de erros humanos e $150k/ano em custos operacionais.
  
  proposed_solution: |
    Sistema automatizado de exports com scheduling, validaçăo integrada
    e suporte a 5 formatos (CSV, Excel, JSON, Parquet, PDF).
  
  expected_impact: |
    Reduçăo de 87% no tempo de exportaçăo, eliminaçăo de 90% dos erros,
    ROI positivo em 4 meses ($120k savings/ano).

goals:
  primary_goal: "Reduzir tempo médio de exportaçăo de 1.8h para 15min com 95% de precisăo até fim de Q1 2025"
  
  success_metrics:
    kpis:
      - metric: "Time to Export (TTE)"
        baseline: "1.8 hours"
        target: "15 minutes"

roadmap:
  phases:
    - phase: "Phase 1 - MVP (4 weeks)"
      deliverables:
        - "? CSV/Excel export formats"
        - "? Daily scheduling"
        - "? Email notifications"
```

