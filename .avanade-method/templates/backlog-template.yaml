---

## ?? Objetivo

Template padronizado para estruturaçăo e documentaçăo de Product Backlog. Define formato para Epics, Features e User Stories, além de critérios de priorizaçăo e organizaçăo.

---

## ?? Backlog Structure Template

```yaml
# Product Backlog

## Metadata
backlog_id: "BACKLOG-[PROJECT]"
product: "[Nome do Produto]"
version: "1.0"
last_updated: "[YYYY-MM-DD]"
owner: "[Product Owner Name]"
total_items: 0
ready_items: 0

---

## 1. Backlog Overview

### 1.1 Product Vision
vision: |
  [Declaraçăo de visăo do produto em 2-3 frases]

### 1.2 Current Release Goal
release_goal:
  name: "[Nome do Release]"
  target_date: "[YYYY-MM-DD]"
  goal: |
    [Objetivo do release]
  
### 1.3 Backlog Health Metrics
metrics:
  total_epics: 0
  total_stories: 0
  ready_for_sprint: 0
  groomed_percentage: 0
  velocity_avg: 0

---

## 2. Epics

### Epic Template
epics:
  - id: "EPIC-001"
    title: "[Título do Epic]"
    status: "[Draft | Defined | In Progress | Done]"
    priority: "[Must Have | Should Have | Could Have | Won't Have]"
    business_value: "[Alto | Médio | Baixo]"
    
    description: |
      [Descriçăo do Epic em 2-3 parágrafos]
    
    business_driver: "[Driver de negócio que justifica]"
    success_metrics:
      - metric: "[Métrica]"
        target: "[Meta]"
    
    features:
      - id: "FEAT-001"
        title: "[Título da Feature]"
        
    acceptance_criteria:
      - "[Critério de aceitaçăo do Epic]"
      
    dependencies:
      - "[Dependęncia externa ou de outro Epic]"
      
    estimated_effort: "[T-shirt size: XS|S|M|L|XL|XXL]"
    target_release: "[Release name]"

---

## 3. Features

### Feature Template
features:
  - id: "FEAT-001"
    title: "[Título da Feature]"
    epic_id: "EPIC-001"
    status: "[Draft | Defined | In Progress | Done]"
    priority: "[Must Have | Should Have | Could Have]"
    
    description: |
      [Descriçăo da feature]
    
    value_statement: |
      Como [tipo de usuário],
      quero [capacidade],
      para que [benefício].
    
    stories:
      - id: "STORY-001"
        title: "[Título da Story]"
        points: 0
        
    acceptance_criteria:
      - "[Critério de aceitaçăo]"
      
    ux_required: true
    technical_notes: |
      [Notas técnicas relevantes]

---

## 4. User Stories

### Story Template (Reference: ${AVANADE_STORY_TEMPLATE_YAML})
stories:
  - id: "STORY-001"
    title: "[Título conciso]"
    feature_id: "FEAT-001"
    epic_id: "EPIC-001"
    
    status: "[Draft | Ready | In Progress | Review | Done]"
    sprint: "[Sprint number ou Backlog]"
    priority: "[Must | Should | Could | Won't]"
    
    # Story Statement
    as_a: "[Tipo de usuário]"
    i_want: "[Funcionalidade]"
    so_that: "[Benefício]"
    
    # Sizing
    story_points: "[1|2|3|5|8|13]"
    t_shirt: "[XS|S|M|L|XL]"
    
    # Readiness
    acceptance_criteria:
      - given: "[Contexto]"
        when: "[Açăo]"
        then: "[Resultado]"
    
    ready_checklist:
      - criteria: "AC definidos"
        met: false
      - criteria: "Estimado"
        met: false
      - criteria: "Dependencies resolvidas"
        met: false
      - criteria: "UX pronto"
        met: false
    
    # Assignment
    assigned_to: ""
    reviewer: ""
    
    # Tracking
    created_at: "[YYYY-MM-DD]"
    started_at: ""
    completed_at: ""
    
    # Links
    design_link: ""
    technical_notes: ""

---

## 5. Backlog Views

### 5.1 By Priority (MoSCoW)
priority_view:
  must_have:
    - "[STORY-ID]: [Title]"
  should_have:
    - "[STORY-ID]: [Title]"
  could_have:
    - "[STORY-ID]: [Title]"
  wont_have:
    - "[STORY-ID]: [Title]"

### 5.2 By Sprint
sprint_view:
  backlog:
    items:
      - "[STORY-ID]: [Title] - [Points]pts"
    total_points: 0
    
  sprint_1:
    goal: "[Sprint goal]"
    items:
      - "[STORY-ID]: [Title] - [Points]pts"
    committed_points: 0
    completed_points: 0
    velocity: 0

### 5.3 By Epic
epic_view:
  - epic: "EPIC-001"
    title: "[Title]"
    progress: "0/10 stories done"
    stories:
      - "[STORY-ID]: [Title] - [Status]"

---

## 6. Refinement Tracking

### 6.1 Refinement Sessions
refinement_log:
  - date: "[YYYY-MM-DD]"
    attendees:
      - "[Name]"
    items_refined:
      - "[STORY-ID]"
    decisions:
      - "[Decisăo tomada]"
    action_items:
      - "[Açăo pendente]"

### 6.2 Stories Needing Refinement
needs_refinement:
  - id: "[STORY-ID]"
    reason: "[Por que precisa refinamento]"
    blocker: "[O que está impedindo]"

---

## 7. Technical Debt

### Technical Debt Items
tech_debt:
  - id: "DEBT-001"
    title: "[Título]"
    description: "[Descriçăo do débito]"
    impact: "[Impacto se năo resolver]"
    effort: "[Esforço para resolver]"
    priority: "[Alta|Média|Baixa]"
    related_stories: 
      - "[STORY-ID]"

---

## 8. Risks & Blockers

### Active Blockers
blockers:
  - id: "BLOCK-001"
    description: "[Descriçăo]"
    affected_items:
      - "[STORY-ID]"
    owner: "[Responsável]"
    status: "[Active | Resolved]"
    resolution: ""

### Risks
risks:
  - id: "RISK-001"
    description: "[Descriçăo do risco]"
    probability: "[Alta|Média|Baixa]"
    impact: "[Alto|Médio|Baixo]"
    mitigation: "[Estratégia]"
    owner: "[Responsável]"
```

