## ? Backlog Health Checklist

- [ ] Top 10 stories are Ready for Sprint
- [ ] All stories have acceptance criteria
- [ ] Stories estimated within last 2 weeks
- [ ] No blockers on Ready stories
- [ ] Dependencies mapped and tracked
- [ ] Tech debt visible and prioritized
- [ ] Refinement sessions scheduled

