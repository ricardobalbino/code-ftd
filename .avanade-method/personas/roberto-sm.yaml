  platform: "D365 CE Online (Sales, CS) + Power Pages + Azure Functions"
  integrations: ["TOTVS/Datasul (ERP)", "ISA (produtos)", "Adobe Sign (contratos)", "Data Lake"]
  focus: "Simulador Comercial - interface de negociação consultiva em Power Pages"
  mandatory_reading:
